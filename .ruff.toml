target-version = "py313"
line-length = 120

[lint]
select = [
    "B",   # flake8-bugbear
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "S",   # flake8-bandit
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]
ignore = [
    "S101",  # assert used (fine in tests)
    "S105",  # hardcoded password (false positives on config key names)
]

[lint.per-file-ignores]
# Upstream code uses camelCase extensively (deviceID, allData, etc.)
"custom_components/foxess/sensor.py" = ["N802", "N803", "N806", "E501", "S324"]

[lint.isort]
known-first-party = ["custom_components.foxess"]
